async function sGet(k) { try { const v = localStorage.getItem("finanzas_"+k); return v ? JSON.parse(v) : null; } catch { return null; } }
async function sSet(k, v) {
  try { localStorage.setItem("finanzas_"+k, JSON.stringify(v)); return true; }
  catch (err) { try{ window.dispatchEvent(new CustomEvent("finanzas-storage-error",{detail:err&&err.name})); }catch{} return false; }
}

function fmt(n) { if (!n && n!==0) return "—"; return new Intl.NumberFormat("es-PY").format(Math.round(n))+" Gs."; }
function hoyLocal(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function haptic(ms=8){ try{ navigator.vibrate && navigator.vibrate(ms); }catch{} }
function parseISO(iso){ const [y,m,d]=iso.split("-").map(Number); return {y,m,d}; }
function buildISO(y,m,d){ return `${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`; }
const MESES_CORTOS = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
function DateSelector({ value, onChange, styleInp }) {
  const { y, m, d } = parseISO(value);
  const anioActual = new Date().getFullYear();
  const anios = [anioActual-1, anioActual, anioActual+1];
  const dias = Array.from({length:31},(_,i)=>i+1);
  const selStyle = { ...styleInp, appearance:"none", WebkitAppearance:"none", textAlign:"center", cursor:"pointer", backgroundImage:"none" };
  return (
    <div style={{display:"flex",gap:8}}>
      <select value={d} onChange={e=>onChange(buildISO(y,m,Number(e.target.value)))} style={{...selStyle,flex:1}}>
        {dias.map(dd=><option key={dd} value={dd}>{dd}</option>)}
      </select>
      <select value={m} onChange={e=>onChange(buildISO(y,Number(e.target.value),d))} style={{...selStyle,flex:1.4}}>
        {MESES_CORTOS.map((mm,i)=><option key={i} value={i+1}>{mm}</option>)}
      </select>
      <select value={y} onChange={e=>onChange(buildISO(Number(e.target.value),m,d))} style={{...selStyle,flex:1.1}}>
        {anios.map(yy=><option key={yy} value={yy}>{yy}</option>)}
      </select>
    </div>
  );
}
function soloDigitos(v) { return v.replace(/\D/g,""); }
function formatearMientrasEscribe(v) { const d=soloDigitos(v); if(!d) return ""; return new Intl.NumberFormat("es-PY").format(parseInt(d)); }
function mesKey(fecha) { const p=fecha.split("/"); if(p.length===3) return `${p[2]}-${p[1].padStart(2,"0")}`; return fecha; }
function mesLabel(k) { const [y,m]=k.split("-"); return `${["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"][parseInt(m)-1]} ${y}`; }

function ProgressBar({ pagadas, total, monto, label }) {
  const pct = total ? Math.min(100, Math.round((pagadas/total)*100)) : null;
  const acumulado = pagadas * monto;
  const restante = total ? (total-pagadas)*monto : null;
  return (
    <div style={{marginTop:10,background:C.bg,borderRadius:12,padding:"12px 14px"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
        <span style={{fontSize:11,color:C.muted,fontWeight:600}}>{label}</span>
        <span style={{fontSize:11,fontWeight:800,color:C.accentDeep}}>{pagadas}{total?` / ${total}`:""} cuotas</span>
      </div>
      {total && <div style={{background:"rgba(255,255,255,0.1)",borderRadius:4,height:4,marginBottom:8,overflow:"hidden"}}>
        <div style={{width:`${pct}%`,height:"100%",background:`linear-gradient(90deg,${C.accent}33,${C.accentDeep})`,borderRadius:5,transition:"width 0.4s ease"}}/>
      </div>}
      <div style={{display:"flex",gap:14,fontSize:11,color:C.muted}}>
        <span>Acumulado: <strong style={{color:C.accentDeep}}>{fmt(acumulado)}</strong></span>
        {restante!==null && <span>Resta: <strong style={{color:C.danger}}>{fmt(restante)}</strong></span>}
        {total && <span style={{color:C.accentDeep,fontWeight:800,marginLeft:"auto"}}>{pct}%</span>}
      </div>
    </div>
  );
}

    },0);
    const activos = totalAhorrado + acumMango + acumMutual + porCobrar;
    let pasivos = 0;

  function calcularSaludFinanciera(){
    let score = 50;
    const checks = [];
    let racha=0;
    for(const h of historial){ if((h.ahorro||0)>0) racha++; else break; }
    if(racha>=3){ score+=15; checks.push({ok:true,label:"Ahorrando seguido hace "+racha+" quincenas"}); }
    else if(historial.length>0 && racha===0){ score-=10; checks.push({ok:false,label:"No ahorraste en la última quincena"}); }
    const ratioDeuda = patrimonio.activos>0 ? patrimonio.pasivos/patrimonio.activos : (patrimonio.pasivos>0?2:0);
    if(ratioDeuda<0.5){ score+=20; checks.push({ok:true,label:"Endeudamiento controlado"}); }
    else if(ratioDeuda<1){ score+=5; checks.push({ok:null,label:"Endeudamiento moderado"}); }
    else { score-=15; checks.push({ok:false,label:"Deuda alta respecto a tus activos"}); }
    const pendientesUltima = historial[0]?.pagos?historial[0].pagos.filter(p=>!p.done).length:0;
    if(historial.length>0 && pendientesUltima===0){ score+=10; checks.push({ok:true,label:"Pagos al día"}); }
    else if(pendientesUltima>0){ score-=10; checks.push({ok:false,label:pendientesUltima+" pago(s) pendiente(s)"}); }
    if(historial.length>0){
      const ultimo = historial[0];
      const pctAhorro = ultimo.total>0 ? (ultimo.ahorro/ultimo.total)*100 : 0;
      if(pctAhorro>=20){ score+=10; checks.push({ok:true,label:"Buen porcentaje de ahorro"}); }
      else if(pctAhorro<10){ score-=5; checks.push({ok:false,label:"Bajo porcentaje de ahorro"}); }
    }
    score = Math.max(0,Math.min(100,Math.round(score)));
    let nivel, color;
    if(score>=80){nivel="Excelente";color=C.accent;}
    else if(score>=60){nivel="Buena";color=C.accentDeep;}
    else if(score>=40){nivel="Regular";color=C.warn;}
    else {nivel="Necesita atención";color=C.danger;}
    return {score,nivel,color,checks};
  }

  function mesesTranscurridos(fechaISO){
    const [y,m,d] = fechaISO.split("-").map(Number);
    const inicio = new Date(y,m-1,d);
    const hoy = new Date();
    let meses = (hoy.getFullYear()-inicio.getFullYear())*12 + (hoy.getMonth()-inicio.getMonth());
    if(hoy.getDate()<inicio.getDate()) meses--;
    return Math.max(0, meses);
  }

  function calcularInteresPrestamo(p){
    const montoCobrado = (p.pagos||[]).reduce((a,x)=>a+(x.monto||0),0);
    let montoTotalAPagar;
    if(p.tipoInteres==="mensual" && p.interesPct){
      const meses = mesesTranscurridos(p.fecha);
      montoTotalAPagar = p.capital + (p.capital*p.interesPct/100*meses);
    } else {
      montoTotalAPagar = p.montoTotalAPagar || (p.capital + (p.capital*(p.interesPct||0)/100)) || (p.monto*p.totalCuotas);
    }
    const montoRestante = Math.max(0, montoTotalAPagar-montoCobrado);
    const interesGanado = p.capital ? montoTotalAPagar-p.capital : null;
    const pctInteres = p.capital>0 ? Math.round((interesGanado/p.capital)*100) : null;
    const pctPagado = montoTotalAPagar>0 ? Math.min(100,Math.round((montoCobrado/montoTotalAPagar)*100)) : 0;
    const cuotaSugerida = Math.min(p.cuotaEstimada||p.monto||0, montoRestante);
    const vencimiento = p.fecha ? sumarMeses(p.fecha, p.totalCuotas||0) : null;
    const hoy = new Date();
    let estado = "Pendiente";
    if(montoRestante<=0) estado = "Pagado";
    else if(vencimiento && hoy>new Date(vencimiento+"T23:59:59")) estado = "Vencido";
    return { montoCobrado, montoTotalAPagar, montoRestante, interesGanado, pctInteres, pctPagado, cuotaSugerida, vencimiento, estado };
  }
  function agregarObservacion(prestamoId, texto){
    if(!texto) return;
    setPrestamosDados(prev=>prev.map(p=>p.id===prestamoId?{...p,observaciones:[...(p.observaciones||[]),{id:Date.now(),texto,fecha:hoyLocal()}]}:p));

    setNuevaObsInput("");
    tk("✓ Observación agregada");
  }
  function marcarCuotaCobrada(prestamoId, cuentaDestino, montoPago){
    haptic(15);
    setPrestamosDados(prev=>prev.map(p=>{
      if(p.id!==prestamoId) return p;
      const nuevaFecha = p.fechaPago ? sumarMeses(p.fechaPago,1) : hoyLocal();
      return {...p, pagos:[...(p.pagos||[]),{id:Date.now(),fecha:hoyLocal(),monto:montoPago,cuenta:cuentaDestino}], fechaPago:nuevaFecha};
    }));
    if(cuentaDestino==="ahorro") setAhorroInicial(a=>a+montoPago);
    else if(cuentaDestino==="ocio"){
      const p = prestamosDados.find(x=>x.id===prestamoId);
      setExtrasReg(ex=>[{id:Date.now(),fecha:hoyLocal(),desc:`Cobro préstamo — ${p?.nombre||""}`,monto:montoPago,destino:"ocio"},...ex]);

    setMontoCobroInput("");
    tk("✓ Cuota cobrada registrada");
  }

    if(!nuevaDeuda.nombre||!nuevaDeuda.monto||!nuevaDeuda.totalCuotas) return;
    const setList = nuevaDeuda.dia==="18"?setFijos18:setFijos5;
    const list = nuevaDeuda.dia==="18"?fijos18:fijos5;
    const monto = Number(soloDigitos(nuevaDeuda.monto));
    const total = Number(soloDigitos(nuevaDeuda.totalCuotas));
    const capital = nuevaDeuda.capital?Number(soloDigitos(nuevaDeuda.capital)):null;
    setList([...list,{
      id:Date.now(), label:nuevaDeuda.nombre, monto, destino:"Banco", activo:true,

    }]);

  function calcularInteres(f){
    if(!f.capital||!f.cuotas?.total) return null;

    return { totalAPagar, interesTotal, pctInteres, pagadoHastaAhora };
  }

          {/* Gasto real vs estimado */}
          {(()=>{
            const conDatos = historial.filter(h=>h.gastoReal!==null&&h.gastoReal!==undefined);
            if(conDatos.length===0) return null;
            const promedioReal = conDatos.reduce((a,h)=>a+h.gastoReal,0)/conDatos.length;
            const estimadoActual = conDatos[0].gastoEstimado||totalVarsN;
            const diff = promedioReal-estimadoActual;
            const pctDiff = estimadoActual>0?Math.round((diff/estimadoActual)*100):0;
            return(
              <div style={cardStyle}>
                <div style={sectionTitle}>Gasto real vs estimado</div>
                <div style={{display:"flex",gap:10,marginBottom:10}}>
                  <div style={{flex:1,background:C.bg,borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
                    <div style={{fontSize:10,color:C.muted,fontWeight:600}}>Estimado</div>
                    <div style={{fontSize:14,fontWeight:700,fontFamily:"monospace"}}>{fmt(estimadoActual)}</div>
                  </div>
                  <div style={{flex:1,background:Math.abs(pctDiff)>15?C.warnSoft:C.accentSoft,borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
                    <div style={{fontSize:10,color:Math.abs(pctDiff)>15?C.warn:C.accentDeep,fontWeight:600}}>Real (promedio)</div>
                    <div style={{fontSize:14,fontWeight:700,color:Math.abs(pctDiff)>15?C.warn:C.accentDeep,fontFamily:"monospace"}}>{fmt(promedioReal)}</div>
                  </div>
                </div>
                {Math.abs(pctDiff)>15?
                  <div style={{fontSize:12,color:C.warn,fontWeight:600}}>⚠️ Tu gasto real está {pctDiff>0?"":"un "}{Math.abs(pctDiff)}% {pctDiff>0?"por encima":"por debajo"} de lo estimado. Considerá ajustar el monto en Config → Variables.</div>
                  :<div style={{fontSize:12,color:C.accentDeep,fontWeight:600,display:"flex",alignItems:"center",gap:6}}><NavIcon name="checkCircle" size={14} strokeWidth={1.8}/> Tu estimado está bien calculado (diferencia de solo {Math.abs(pctDiff)}%).</div>
                }
                <div style={{fontSize:10,color:C.mutedLight,marginTop:8}}>Basado en {conDatos.length} quincena{conDatos.length!==1?"s":""} con gasto real cargado</div>
              </div>
            );
          })()}

          {/* Comparativo vs quincena anterior */}
          {historial.length>=2&&(()=>{
            const actual=historial[0], anterior=historial[1];
            const dif=actual.ahorro-anterior.ahorro;
            const subio=dif>=0;
            return(
              <div style={cardStyle}>
                <div style={sectionTitle}>Comparativo vs quincena anterior</div>
                <div style={{display:"flex",gap:10,marginBottom:10}}>
                  <div style={{flex:1,background:C.bg,borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
                    <div style={{fontSize:10,color:C.muted,fontWeight:600}}>Día {anterior.quincena}</div>
                    <div style={{fontSize:13,fontWeight:700,fontFamily:"monospace"}}>{fmt(anterior.ahorro)}</div>
                  </div>
                  <div style={{flex:1,background:C.accentSoft,borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
                    <div style={{fontSize:10,color:C.accentDeep,fontWeight:600}}>Día {actual.quincena} (última)</div>
                    <div style={{fontSize:13,fontWeight:700,color:C.accentDeep,fontFamily:"monospace"}}>{fmt(actual.ahorro)}</div>
                  </div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8,fontSize:12,color:subio?C.accentDeep:C.danger,fontWeight:700}}>

                  <span>{subio?"Subió":"Bajó"} {fmt(Math.abs(dif))} respecto a la anterior</span>
                </div>
              </div>
            );
          })()}

          {/* Promedio de ahorro mensual */}
          {historial.length>0&&(()=>{
            const mesesMap={};
            historial.forEach(h=>{ const k=mesKey(h.fecha); mesesMap[k]=(mesesMap[k]||0)+(h.ahorro||0); });
            const valores=Object.values(mesesMap);
            const promedioMensual=valores.reduce((a,b)=>a+b,0)/valores.length;
            return(
              <div style={cardStyle}>
                <div style={sectionTitle}>Promedio de ahorro mensual</div>
                <div style={{fontSize:22,fontWeight:800,color:C.accentDeep,fontFamily:"monospace",marginBottom:4}}>{fmt(promedioMensual)}</div>
                <div style={{fontSize:11,color:C.muted}}>Basado en {valores.length} mes{valores.length!==1?"es":""} registrado{valores.length!==1?"s":""}</div>
              </div>
            );
          })()}

          {/* Resumen de progreso de deudas */}
          {todosConCuotas.length>0&&(
            <div style={cardStyle}>
              <div style={sectionTitle}>Progreso de deudas</div>
              {todosConCuotas.map(f=>{
                const pct = f.cuotas.total ? Math.min(100,Math.round((f.cuotas.pagadas/f.cuotas.total)*100)) : null;
                return(
                  <div key={`${f.dia}-${f.id}`} style={{marginBottom:12}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                      <span style={{fontSize:12,fontWeight:600}}>{f.label}</span>
                      <span style={{fontSize:11,fontWeight:700,color:C.accentDeep}}>{f.cuotas.pagadas}{f.cuotas.total?`/${f.cuotas.total}`:""}</span>
                    </div>
                    {pct!==null&&<div style={{background:"rgba(255,255,255,0.1)",borderRadius:4,height:4,overflow:"hidden"}}>
                      <div style={{width:`${pct}%`,height:"100%",background:`linear-gradient(90deg,${C.accent}33,${C.accentDeep})`,borderRadius:5}}/>
                    </div>}
                  </div>
                );
              })}
            </div>
          )}

          {/* Gráfico rápido últimos 3 meses / desglose si es un solo mes */}
          {(()=>{
            const lim3=new Date(); lim3.setMonth(lim3.getMonth()-3);
            const hist3=historial.filter(h=>{ const p=h.fecha?.split("/"); if(!p||p.length!==3) return true; return new Date(p[2],p[1]-1,p[0])>=lim3; });
            const ext3=extrasReg.filter(e=>{ const p=e.fecha?.split("/"); if(!p||p.length!==3) return true; return new Date(p[2],p[1]-1,p[0])>=lim3; });
            const meses3=agruparMes(hist3,ext3);
            if(meses3.length===0) return null;

            // Con un solo mes, el gráfico de barras no dice nada — mostramos el desglose de ese mes
            if(meses3.length===1){
              const m=meses3[0];
              const pctAhorro = m.totalIngreso>0 ? Math.round((m.totalAhorro/m.totalIngreso)*100) : 0;
              return(
                <div style={cardStyle}>
                  <div style={sectionTitle}>{mesLabel(m.key)}</div>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>

                    <span style={{fontSize:14,fontWeight:700,fontFamily:"monospace"}}>{fmt(m.totalIngreso)}</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                    <span style={{fontSize:13,color:C.muted}}>Ahorrado</span>
                    <span style={{fontSize:14,fontWeight:700,color:C.accentDeep,fontFamily:"monospace"}}>{fmt(m.totalAhorro)}</span>
                  </div>
                  <div style={{background:"rgba(255,255,255,0.1)",borderRadius:4,height:4,overflow:"hidden",marginBottom:6}}>
                    <div style={{width:`${Math.min(100,pctAhorro)}%`,height:"100%",background:`linear-gradient(90deg,${C.accent}33,${C.accentDeep})`,borderRadius:6}}/>
                  </div>

                </div>
              );
            }

            const maxA=Math.max(...meses3.map(x=>x.totalAhorro),1);
            return(
              <div style={cardStyle}>
                <div style={sectionTitle}>Últimos 3 meses</div>
                <div style={{display:"flex",alignItems:"flex-end",gap:8,height:70,marginBottom:8}}>
                  {[...meses3].reverse().map((m,i)=>{
                    const h=Math.max(4,Math.round((m.totalAhorro/maxA)*62));
                    return(
                      <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                        <div style={{fontSize:9,color:C.accentDeep,fontWeight:700}}>{fmt(m.totalAhorro).replace(" Gs.","")}</div>
                        <div style={{width:"100%",height:h,background:`linear-gradient(180deg,${C.accent},${C.accentDeep})`,borderRadius:"5px 5px 0 0"}}/>
                        <div style={{fontSize:9,color:C.muted,fontWeight:600}}>{mesLabel(m.key).split(" ")[0]}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })()}
        </>}

                  <span style={{display:"inline-flex",alignItems:"center",gap:4}}><span style={{width:6,height:6,borderRadius:"50%",background:C.warn,display:"inline-block"}}/>Variables {Math.round((resultado.totalVars/resultado.total)*100)}%</span>
                  <span style={{color:C.accentDeep,fontWeight:800,display:"inline-flex",alignItems:"center",gap:4}}><span style={{width:6,height:6,borderRadius:"50%",background:C.accent,display:"inline-block"}}/>Ahorro {Math.round((resultado.dist.ahorro/resultado.total)*100)}%</span>
                </div>

              {[

                  <span style={{fontSize:r.bold?16:13,fontWeight:r.bold?800:700,color:r.color||C.text,fontFamily:"monospace"}}>{r.value}</span>
                </div>

                {label:`Ahorro → ${cn("ahorro")}`,value:fmt(resultado.dist.ahorro),sub:`Transferir a ${cn("ahorro")}`,highlight:true},

          </>}

              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{if(ahorroInicialInput){setAhorroInicial(Number(soloDigitos(ahorroInicialInput)));}setAhorroInicialInput("");setEditAhorroInicial(false);tk("✓ Ahorro inicial actualizado");}} style={{flex:1,padding:"11px 0",background:C.accentDeep,border:"none",borderRadius:10,color:C.white,fontWeight:700,fontSize:13,cursor:"pointer"}}>Guardar</button>
                <button onClick={()=>{setAhorroInicialInput("");setEditAhorroInicial(false);}} style={{flex:1,padding:"11px 0",background:C.bg,border:`1px solid ${C.cardBorder}`,borderRadius:10,color:C.muted,fontSize:13,cursor:"pointer"}}>Cancelar</button>
              </div>
            </>:<>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontSize:18,fontWeight:800,fontFamily:"monospace",color:ahorroInicial?C.accent:C.muted}}>{ahorroInicial?fmt(ahorroInicial):"Sin cargar"}</div>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>{setAhorroInicialInput(ahorroInicial?new Intl.NumberFormat("es-PY").format(ahorroInicial):"");setEditAhorroInicial(true);}} style={{background:C.bg,border:`1px solid ${C.cardBorder}`,borderRadius:10,width:34,height:34,fontSize:15,color:C.muted,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><NavIcon name="pencil" size={13} strokeWidth={2}/></button>
                  {ahorroInicial>0&&<button onClick={()=>{if(window.confirm("¿Eliminar el ahorro inicial cargado? Esto resta ese monto de tu total.")){setAhorroInicial(0);tk("Ahorro inicial eliminado");}}} style={{background:C.dangerSoft,border:"none",borderRadius:10,width:34,height:34,fontSize:15,color:C.danger,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><NavIcon name="trash" size={15} strokeWidth={1.8}/></button>}
                </div>
              </div>
            </>}
          </div>

          <div style={cardStyle}>
            <div style={{...sectionTitle,marginBottom:6,display:"flex",alignItems:"center",gap:7}}><NavIcon name="sprout" size={13} strokeWidth={1.8}/> Ganadería — {cn("ganaderia")}</div>
            <div style={{fontSize:12,color:C.muted,marginBottom:16,fontWeight:500}}>El monto de este pago cambió con el tiempo, así que acá cargás directamente cuánto ya diste en total (no por cuotas). Cada quincena que guardes con Ganadería activa, se suma sola el monto real de ese momento.</div>
            {editGanaderiaInicial?<>
              <input style={{...inp,fontFamily:"monospace",marginBottom:10}} type="text" inputMode="numeric" placeholder="Ej: 1.500.000" value={ganaderiaInicialInput} onChange={e=>setGanaderiaInicialInput(formatearMientrasEscribe(e.target.value))}/>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{if(ganaderiaInicialInput){setGanaderiaInicial(Number(soloDigitos(ganaderiaInicialInput)));}setGanaderiaInicialInput("");setEditGanaderiaInicial(false);tk("✓ Monto inicial actualizado");}} style={{flex:1,padding:"11px 0",background:C.accentDeep,border:"none",borderRadius:10,color:C.white,fontWeight:700,fontSize:13,cursor:"pointer"}}>Guardar</button>
                <button onClick={()=>{setGanaderiaInicialInput("");setEditGanaderiaInicial(false);}} style={{flex:1,padding:"11px 0",background:C.bg,border:`1px solid ${C.cardBorder}`,borderRadius:10,color:C.muted,fontSize:13,cursor:"pointer"}}>Cancelar</button>
              </div>
            </>:<>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:10,color:C.muted}}>Ya dado antes (base manual)</div>
                  <div style={{fontSize:16,fontWeight:800,fontFamily:"monospace",color:ganaderiaInicial?C.gold:C.muted}}>{ganaderiaInicial?fmt(ganaderiaInicial):"Sin cargar"}</div>
                </div>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>{setGanaderiaInicialInput(ganaderiaInicial?new Intl.NumberFormat("es-PY").format(ganaderiaInicial):"");setEditGanaderiaInicial(true);}} style={{background:C.bg,border:`1px solid ${C.cardBorder}`,borderRadius:10,width:34,height:34,fontSize:15,color:C.muted,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><NavIcon name="pencil" size={13} strokeWidth={2}/></button>
                  {ganaderiaInicial>0&&<button onClick={()=>{if(window.confirm("¿Eliminar el monto inicial de ganadería?")){setGanaderiaInicial(0);tk("Eliminado");}}} style={{background:C.dangerSoft,border:"none",borderRadius:10,width:34,height:34,fontSize:15,color:C.danger,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><NavIcon name="trash" size={15} strokeWidth={1.8}/></button>}
                </div>
              </div>
              <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.divider}`,fontSize:11,color:C.muted}}>
                Total acumulado: <strong style={{color:C.gold}}>{fmt(ganaderiaInicial+aportesGanaderia.reduce((a,x)=>a+(x.monto||0),0))}</strong> ({aportesGanaderia.length} aporte{aportesGanaderia.length!==1?"s":""} registrado{aportesGanaderia.length!==1?"s":""} + base manual)
              </div>
              {(ganaderiaInicial>0||aportesGanaderia.length>0)&&<button onClick={()=>{if(window.confirm("¿Reiniciar TODO el acumulado de Ganadería a 0? Esto borra la base manual Y todos los aportes automáticos guardados hasta ahora. No se puede deshacer.")){setGanaderiaInicial(0);setAportesGanaderia([]);tk("✓ Reiniciado en 0");}}} style={{width:"100%",marginTop:10,padding:"9px 0",background:"transparent",border:`1px solid ${C.cardBorder}`,borderRadius:9,color:C.muted,fontSize:11,cursor:"pointer",fontWeight:600}}>↺ Reiniciar todo el acumulado a 0</button>}
            </>}
          </div>

          <div style={cardStyle}>
            <div style={{...sectionTitle,marginBottom:6}}>Meta general — {cn("ahorro")}</div>
            <div style={{fontSize:12,color:C.muted,marginBottom:16,fontWeight:500}}>Configurá cuánto querés ahorrar en {cn("ahorro")}. El progreso se ve en Inicio.</div>
            {editMetaGeneral?<>
              <input style={{...inp,fontFamily:"monospace",marginBottom:10}} type="text" inputMode="numeric" placeholder="Meta en Gs. (ej: 10.000.000)" value={metaInput} onChange={e=>setMetaInput(formatearMientrasEscribe(e.target.value))}/>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{if(metaInput){setMeta(Number(soloDigitos(metaInput)));}setMetaInput("");setEditMetaGeneral(false);tk("✓ Meta guardada");}} style={{flex:1,padding:"11px 0",background:C.accentDeep,border:"none",borderRadius:10,color:C.white,fontWeight:700,fontSize:13,cursor:"pointer"}}>Guardar</button>
                <button onClick={()=>{setMetaInput("");setEditMetaGeneral(false);}} style={{flex:1,padding:"11px 0",background:C.bg,border:`1px solid ${C.cardBorder}`,borderRadius:10,color:C.muted,fontSize:13,cursor:"pointer"}}>Cancelar</button>
              </div>
            </>:<>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontSize:18,fontWeight:800,fontFamily:"monospace",color:meta?C.accent:C.muted}}>{meta?fmt(meta):"Sin meta configurada"}</div>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>{setMetaInput(meta?new Intl.NumberFormat("es-PY").format(meta):"");setEditMetaGeneral(true);}} style={{background:C.bg,border:`1px solid ${C.cardBorder}`,borderRadius:10,width:34,height:34,fontSize:15,color:C.muted,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><NavIcon name="pencil" size={13} strokeWidth={2}/></button>
                  {meta&&<button onClick={()=>{if(window.confirm("¿Eliminar la meta general de ahorro?")){setMeta(null);tk("Meta eliminada");}}} style={{background:C.dangerSoft,border:"none",borderRadius:10,width:34,height:34,fontSize:15,color:C.danger,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><NavIcon name="trash" size={15} strokeWidth={1.8}/></button>}
                </div>
              </div>
            </>}
          </div>

          <div style={cardStyle}>
            <div style={{...sectionTitle,marginBottom:6}}>Metas de proyecto</div>
            <div style={{fontSize:12,color:C.muted,marginBottom:16,fontWeight:500}}>Metas separadas con fecha objetivo (ej: barbería, viaje). Vas aportando de a montos libres — la app recalcula solo cuánto falta por quincena.</div>
            {metasExtra.map(m=>{
              const c=calcularMetaExtra(m);
              return(
              <div key={m.id} style={{borderBottom:`1px solid ${C.divider}`,paddingBottom:10,marginBottom:10}}>
                {editMetaExtra===m.id?<div style={{display:"flex",flexDirection:"column",gap:8}}>
                  <input defaultValue={m.nombre} id={`mn-${m.id}`} placeholder="Nombre" style={{...inp,fontSize:13}}/>
                  <input defaultValue={new Intl.NumberFormat("es-PY").format(m.monto)} id={`mm-${m.id}`} type="text" inputMode="numeric" placeholder="Monto objetivo" style={{...inp,fontSize:13,fontFamily:"monospace"}} onChange={e=>{e.target.value=formatearMientrasEscribe(e.target.value);}}/>
                  <input defaultValue={m.fecha} id={`mf-${m.id}`} type="date" style={{...inp,fontSize:13}}/>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={()=>{
                      const nombre=document.getElementById(`mn-${m.id}`).value;
                      const monto=soloDigitos(document.getElementById(`mm-${m.id}`).value);
                      const fecha=document.getElementById(`mf-${m.id}`).value;
                      setMetasExtra(metasExtra.map(x=>x.id===m.id?{...x,nombre,monto,fecha}:x));
                      setEditMetaExtra(null); tk("✓ Meta actualizada");
                    }} style={{flex:1,padding:"8px 0",background:C.accentDeep,border:"none",borderRadius:8,color:C.white,fontSize:12,cursor:"pointer",fontWeight:700}}>Guardar</button>
                    <button onClick={()=>setEditMetaExtra(null)} style={{flex:1,padding:"8px 0",background:C.bg,border:`1px solid ${C.cardBorder}`,borderRadius:8,color:C.muted,fontSize:12,cursor:"pointer"}}>Cancelar</button>
                  </div>
                </div>:<>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                    <div>
                      <div style={{fontSize:13,fontWeight:700}}>{m.nombre}</div>
                      <div style={{fontSize:11,color:C.muted,fontFamily:"monospace"}}>{fmt(c.acumulado)} / {fmt(c.objetivo)}{m.fecha?` · hasta ${m.fecha}`:""}</div>
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      <button onClick={()=>setEditMetaExtra(m.id)} style={{background:C.bg,border:`1px solid ${C.cardBorder}`,borderRadius:7,padding:"5px 10px",fontSize:11,color:C.muted,cursor:"pointer"}}><NavIcon name="pencil" size={13} strokeWidth={2}/></button>
                      <button onClick={()=>{if(window.confirm("¿Eliminar esta meta? Se pierden los aportes registrados.")){setMetasExtra(metasExtra.filter(x=>x.id!==m.id));tk("Meta eliminada");}}} style={{background:C.dangerSoft,border:"none",borderRadius:7,padding:"5px 9px",fontSize:11,color:C.danger,cursor:"pointer"}}>✕</button>
                    </div>
                  </div>
                  <div style={{fontSize:10,color:C.mutedLight}}>{(m.contribuciones||[]).length} aporte{(m.contribuciones||[]).length!==1?"s":""} registrado{(m.contribuciones||[]).length!==1?"s":""}</div>
                </>}
              </div>
            );})}
            <input placeholder="Nombre (ej: Barbería)" value={nuevaMetaExtra.nombre} onChange={e=>setNuevaMetaExtra(p=>({...p,nombre:e.target.value}))} style={{...inp,fontSize:13,marginBottom:8}}/>
            <input placeholder="Monto objetivo" type="text" inputMode="numeric" value={nuevaMetaExtra.monto} onChange={e=>setNuevaMetaExtra(p=>({...p,monto:formatearMientrasEscribe(e.target.value)}))} style={{...inp,fontSize:13,fontFamily:"monospace",marginBottom:8}}/>
            <input placeholder="Ya tenés ahorrado (opcional)" type="text" inputMode="numeric" value={nuevaMetaExtra.acumulado} onChange={e=>setNuevaMetaExtra(p=>({...p,acumulado:formatearMientrasEscribe(e.target.value)}))} style={{...inp,fontSize:13,fontFamily:"monospace",marginBottom:8}}/>
            <input type="date" value={nuevaMetaExtra.fecha} onChange={e=>setNuevaMetaExtra(p=>({...p,fecha:e.target.value}))} style={{...inp,fontSize:13,marginBottom:10}}/>
            <button onClick={()=>{
              if(!nuevaMetaExtra.nombre||!nuevaMetaExtra.monto)return;
              const acumuladoInicial = nuevaMetaExtra.acumulado ? Number(soloDigitos(nuevaMetaExtra.acumulado)) : 0;
              setMetasExtra([...metasExtra,{id:Date.now(),nombre:nuevaMetaExtra.nombre,monto:soloDigitos(nuevaMetaExtra.monto),fecha:nuevaMetaExtra.fecha,acumuladoInicial,contribuciones:[]}]);
              setNuevaMetaExtra({nombre:"",monto:"",fecha:"",acumulado:""});
              tk("✓ Meta agregada");
            }} style={{width:"100%",padding:"11px 0",background:"transparent",border:`1.5px dashed ${C.cardBorder}`,borderRadius:10,color:C.accentDeep,fontSize:12,cursor:"pointer",fontWeight:600}}>+ Agregar meta de proyecto</button>
          </div>
          </>}

          {subTabC==="perfil"&&<div style={cardStyle}>
            <div style={{...sectionTitle,marginBottom:6}}>Perfil del usuario</div>
            <div style={{fontSize:12,color:C.muted,marginBottom:18,fontWeight:500}}>Cambiá el nombre y las iniciales que aparecen en el saludo. Útil si otra persona usa esta app.</div>
            <div style={{fontSize:10,color:C.mutedLight,marginBottom:8}}>Versión instalada: v{APP_VERSION}</div>
            {editPerfil?<>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:11,color:C.muted,marginBottom:6,fontWeight:600}}>Nombre</div>
                <input defaultValue={perfil.nombre} id="perf-nombre" style={{...inp,fontSize:15,fontWeight:700}}/>
              </div>
              <div style={{marginBottom:16}}>
                <div style={{fontSize:11,color:C.muted,marginBottom:6,fontWeight:600}}>Iniciales (círculo del saludo, máx 2 letras)</div>
                <input defaultValue={perfil.iniciales} id="perf-iniciales" maxLength={2} style={{...inp,fontSize:15,fontWeight:800,textTransform:"uppercase",width:80}}/>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{
                  const nombre=document.getElementById("perf-nombre").value.trim()||perfil.nombre;
                  const iniciales=document.getElementById("perf-iniciales").value.trim().toUpperCase().slice(0,2)||perfil.iniciales;
                  setPerfil({nombre,iniciales});setEditPerfil(false);tk("✓ Perfil actualizado");
                }} style={{flex:1,padding:"11px 0",background:C.accentDeep,border:"none",borderRadius:10,color:C.white,fontWeight:700,fontSize:13,cursor:"pointer"}}>Guardar</button>
                <button onClick={()=>setEditPerfil(false)} style={{flex:1,padding:"11px 0",background:C.bg,border:`1px solid ${C.cardBorder}`,borderRadius:10,color:C.muted,fontSize:13,cursor:"pointer",fontWeight:600}}>Cancelar</button>
              </div>
            </>:<>
              <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:16}}>
                <div style={{width:48,height:48,borderRadius:"50%",background:C.accentSoft,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:800,color:C.accentDeep,border:`1.5px solid #a7e8c5`}}>{perfil.iniciales}</div>
                <div style={{fontSize:16,fontWeight:800}}>{perfil.nombre}</div>
              </div>
              <button onClick={()=>setEditPerfil(true)} style={{width:"100%",padding:"12px 0",background:C.accentSoft,border:"none",borderRadius:11,color:C.accentDeep,fontWeight:700,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:7}}><NavIcon name="pencil" size={14} strokeWidth={2}/> Editar perfil</button>
            </>}
          </div>}

          {subTabC==="backup"&&<>
            <div style={{...cardStyle,padding:22}}>
              <div style={{fontSize:15,fontWeight:800,marginBottom:8,display:"flex",alignItems:"center",gap:8}}><NavIcon name="save" size={16} strokeWidth={1.8}/> Exportar respaldo</div>
              <div style={{fontSize:13,color:C.muted,marginBottom:18,fontWeight:500}}>Descargá un archivo .json con todo tu historial, configuración y cuotas.</div>
              <button onClick={exportarBackup} style={{width:"100%",padding:"15px 0",background:`linear-gradient(135deg,${C.accentDeep},${C.accent})`,border:"none",borderRadius:13,color:C.white,fontWeight:700,fontSize:15,cursor:"pointer",boxShadow:"0 4px 14px rgba(15,157,88,0.25)"}}><NavIcon name="download" size={16} strokeWidth={1.8}/> Descargar respaldo</button>
              <button onClick={()=>setShowBackupTexto(true)} style={{width:"100%",marginTop:10,padding:"11px 0",background:"transparent",border:`1px solid ${C.cardBorder}`,borderRadius:11,color:C.muted,fontWeight:600,fontSize:12,cursor:"pointer"}}>¿No descarga? Ver como texto</button>
            </div>
            <div style={{...cardStyle,padding:22}}>
              <div style={{fontSize:15,fontWeight:800,marginBottom:8,display:"flex",alignItems:"center",gap:8}}><NavIcon name="upload" size={16} strokeWidth={1.8}/> Restaurar respaldo</div>
              <div style={{fontSize:13,color:C.muted,marginBottom:18,fontWeight:500}}><strong style={{color:C.danger}}>Esto reemplaza los datos actuales.</strong> Exportá primero si tenés datos nuevos.</div>
              <button onClick={()=>fileRef.current?.click()} style={{width:"100%",padding:"15px 0",background:C.bg,border:`1.5px solid ${C.cardBorder}`,borderRadius:13,color:C.text,fontWeight:700,fontSize:15,cursor:"pointer"}}><NavIcon name="folder" size={16} strokeWidth={1.8}/> Cargar archivo</button>
              <button onClick={()=>setShowRestaurarTexto(true)} style={{width:"100%",marginTop:10,padding:"11px 0",background:"transparent",border:`1px solid ${C.cardBorder}`,borderRadius:11,color:C.muted,fontWeight:600,fontSize:12,cursor:"pointer"}}>¿No carga? Pegar texto</button>
            </div>
            <div style={{background:C.warnSoft,border:`1px solid #f3d49a`,borderRadius:14,padding:"13px 16px",fontSize:12,color:C.warn,fontWeight:500}}>⚠️ Exportá un respaldo regularmente. Guarda historial, cuotas, cuentas y toda la configuración.</div>
          </>}
        </>}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
